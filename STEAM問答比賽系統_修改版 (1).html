<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STEAM問答比賽系統</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:"Microsoft JhengHei","微軟正黑體",sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;padding:20px;}
    .container{max-width:1200px;margin:0 auto;background:#fff;border-radius:20px;padding:26px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
    .header{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
    h1{color:#333;font-size:2.1em;}
    .sub{color:#666;font-size:1.05em;}

    .screen{display:none;}
    .screen.active{display:block;}

    .team-order{display:flex;justify-content:center;gap:14px;margin:18px 0;flex-wrap:wrap;}
    .team-card{padding:18px 22px;border-radius:10px;color:#fff;font-size:1.25em;font-weight:700;min-width:140px;text-align:center;}

    .team-red{background:#e74c3c;}
    .team-yellow{background:#f39c12;}
    .team-blue{background:#3498db;}
    .team-green{background:#27ae60;}

    .btn{padding:12px 18px;font-size:1.05em;border:none;border-radius:10px;cursor:pointer;font-weight:700;transition:all .2s;margin:6px;}
    .btn-primary{background:#3498db;color:#fff;}
    .btn-primary:hover{background:#2980b9;transform:translateY(-1px);}
    .btn-success{background:#27ae60;color:#fff;}
    .btn-success:hover{background:#229954;}
    .btn-danger{background:#e74c3c;color:#fff;}
    .btn-danger:hover{background:#c0392b;}
    .btn-nav{background:#95a5a6;color:#fff;padding:10px 14px;font-size:1em;}
    .btn-nav:hover{background:#7f8c8d;}
    .btn-ghost{background:transparent;border:2px solid #95a5a6;color:#666;}
    .btn-ghost:hover{background:#f4f6f7;}

    .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;justify-content:center;}

    .panel{background:#f8f9fa;border-radius:12px;padding:16px;margin:14px 0;}

    .bank-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px;margin-top:10px;}
    .bank-item{background:#fff;border:2px solid #e5e7e9;border-radius:12px;padding:12px;}
    .bank-item label{display:block;font-weight:700;color:#333;margin-bottom:8px;}
    select{width:100%;padding:10px;border-radius:10px;border:2px solid #d0d3d4;font-size:1em;}

    .current-team{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:10px 0;padding:14px 16px;border-radius:12px;font-size:1.35em;font-weight:800;color:#fff;}
    .current-team .small{font-size:.72em;font-weight:700;opacity:.95;}

    .scoreboard{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin:12px 0;}
    .score-card{padding:12px;border-radius:12px;color:#fff;text-align:center;}
    .score-label{font-size:1.1em;margin-bottom:8px;font-weight:800;}
    .score-value{font-size:1.55em;font-weight:900;}

    .question-area{background:#f8f9fa;padding:22px;border-radius:12px;margin:12px 0;}
    .question-header{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
    .question-number{font-size:1.15em;color:#666;}
    .question-category{display:inline-block;padding:8px 12px;background:#3498db;color:#fff;border-radius:8px;font-size:1.05em;font-weight:800;}
    .question-text{font-size:1.55em;margin:14px 0;color:#333;line-height:1.5;}

    .options{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:18px 0;}
    .option{padding:16px;background:#fff;border:3px solid #ddd;border-radius:12px;cursor:pointer;transition:all .15s;font-size:1.1em;}
    .option:hover{border-color:#3498db;background:#e8f4f8;}
    .option.selected{border-color:#3498db;background:#3498db;color:#fff;}
    .option.correct{border-color:#27ae60;background:#27ae60;color:#fff;}
    .option.wrong{border-color:#e74c3c;background:#e74c3c;color:#fff;}

    .controls{display:flex;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap;}

    .answer-revealed{margin-top:10px;padding:12px;border-radius:12px;text-align:center;font-size:1.15em;font-weight:800;display:none;}

    .hint{color:#666;font-size:1em;line-height:1.5;}

    .ready-card{background:#f8f9fa;border-radius:14px;padding:26px;text-align:center;margin-top:12px;}
    .ready-title{font-size:2em;font-weight:900;color:#333;margin-bottom:10px;}
    .ready-sub{font-size:1.2em;color:#555;}

    @media (max-width: 820px){
      .options{grid-template-columns:1fr;}
      h1{font-size:1.65em;}
      .question-text{font-size:1.25em;}
      .current-team{font-size:1.15em;}
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>STEAM問答比賽系統</h1>
        <div class="sub" id="statusLine">主持人控制台（可向觀眾展示）</div>
      </div>
      <div class="row">
        <button class="btn btn-ghost" id="homeBtnTop" onclick="goHome()" style="display:none;">主頁</button>
      </div>
    </div>

    <!-- 主頁 / 設置 -->
    <div class="screen active" id="homeScreen">
      <div class="panel" style="text-align:center;">
        <h2 style="margin-bottom:10px; color:#333;">準備開始比賽</h2>
        <p class="hint">1）可抽取四社作答順序（或保持預設順序）。2）為每一社選擇題目庫。3）按「開始比賽」進入每社準備頁；如需補救，可按「直接作答」。</p>
        <div class="row" style="margin-top:12px;">
          <button class="btn btn-primary" onclick="shuffleTeams()">🎲 抽取順序</button>
          <button class="btn btn-danger" onclick="resetScoresOnly()" id="resetBtn" style="display:none;">重置分數</button>
          <button class="btn btn-success" onclick="resumeOrStart()" id="resumeBtn" style="display:none;">繼續比賽</button>
        </div>
      </div>

      <div class="team-order" id="teamOrder"></div>

      <div class="panel" id="bankPanel" style="display:none;">
        <h3 style="color:#333;">選擇題目庫（對應抽到的第1至第4組）</h3>
        <p class="hint" style="margin-top:8px;">提示：每個題目庫只能選用一次，四組必須使用不同的題目庫。</p>
        <div class="bank-grid" id="bankSelectors"></div>
        <div class="row" style="margin-top:12px;">
          <button class="btn btn-success" id="startBtn" onclick="startQuiz()">開始比賽（先顯示準備頁）</button>
        </div>
      </div>

      <div class="panel" style="margin-top:15px;">
        <h2 style="margin-bottom:10px; color:#333;">單社直接作答</h2>
        <p class="hint">選擇社團及題目庫，直接開始作答（無順序抽取，無多社比賽）。</p>
        <div class="row" style="justify-content:center; gap:15px;">
          <select id="directTeamSel">
            <option value="0">紅社</option>
            <option value="1">黃社</option>
            <option value="2">藍社</option>
            <option value="3">綠社</option>
          </select>
          <select id="directBankSel">
            <option value="0">題目庫 #1</option>
            <option value="1">題目庫 #2</option>
            <option value="2">題目庫 #3</option>
            <option value="3">題目庫 #4</option>
          </select>
          <button class="btn btn-primary" onclick="startSingleDirect()">開始作答</button>
        </div>
      </div>
    </div>

    <!-- 每社作答前準備頁 -->
    <div class="screen" id="readyScreen">
      <div class="ready-card">
        <div class="ready-title" id="readyTitle">準備作答</div>
        <div class="ready-sub" id="readySub">題目庫：#1</div>
        <div style="margin-top:14px;" class="hint">主持人按「開始作答」後才會顯示題目。</div>
        <div class="row" style="margin-top:18px;">
          <button class="btn btn-ghost" onclick="goHome()">主頁</button>
          <button class="btn btn-success" onclick="startTeamQuestions()">開始作答</button>
        </div>
      </div>
    </div>

    <!-- 作答頁 -->
    <div class="screen" id="quizScreen">
      <div class="current-team" id="currentTeamBar">
        <div>
          <div id="currentTeam">當前作答：—</div>
          <div class="small" id="currentBankLine">題目庫：—</div>
        </div>
        <div>
          <button class="btn btn-ghost" onclick="goHome()">主頁</button>
        </div>
      </div>

      <div class="scoreboard" id="scoreboard"></div>

      <div class="question-area">
        <div class="question-header">
          <span class="question-number" id="questionNumber"></span>
          <span class="question-category" id="questionCategory"></span>
        </div>

        <div class="question-text" id="questionText"></div>

        <div class="options" id="options"></div>

        <div class="answer-revealed" id="answerRevealed"></div>
      </div>

      <div class="controls">
        <button class="btn btn-nav" onclick="previousQuestion()" id="prevBtn">⬅️ 上一題</button>
        <button class="btn btn-danger" onclick="clearThisQuestion()" id="clearBtn" style="display:none;">重新作答</button>
        <button class="btn btn-success" onclick="confirmAnswer()" id="confirmBtn" style="display:none;">✓ 確認答案</button>
        <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn" style="display:none;">下一題 ➡️</button>
      </div>
    </div>
  </div>

  <script>
    const teams = [
      { name: '紅社', color: 'red', class: 'team-red' },
      { name: '黃社', color: 'yellow', class: 'team-yellow' },
      { name: '藍社', color: 'blue', class: 'team-blue' },
      { name: '綠社', color: 'green', class: 'team-green' }
    ];

    // 題目庫（共4個，每個20題）
    const questionBanks = [
      // 題目庫 #1
      [
        { category: '數學', question: '若 x + 5 = 12，x 的值是多少？', options: ['5', '7', '8', '17'], answer: 1 },
        { category: '數學', question: '一個圓形的半徑是7cm，其面積約為多少平方厘米？（π ≈ 3.14）', options: ['44', '154', '308', '616'], answer: 1 },
        { category: '數學', question: '以下哪個是質數？', options: ['15', '21', '23', '27'], answer: 2 },
        { category: '數學', question: '2的5次方等於多少？', options: ['10', '16', '32', '64'], answer: 2 },
        { category: '數學', question: '一個三角形的內角和是多少度？', options: ['90度', '180度', '270度', '360度'], answer: 1 },

        { category: '科學', question: '水的化學式是什麼？', options: ['H2O', 'CO2', 'O2', 'NaCl'], answer: 0 },
        { category: '科學', question: '光在真空中的速度約為每秒多少公里？', options: ['30萬', '300萬', '3000萬', '3億'], answer: 0 },
        { category: '科學', question: '人體最大的器官是什麼？', options: ['肝臟', '肺', '皮膚', '心臟'], answer: 2 },
        { category: '科學', question: '地球繞太陽公轉一周需要多長時間？', options: ['一個月', '一季', '一年', '十年'], answer: 2 },
        { category: '科學', question: '以下哪種氣體在空氣中含量最多？', options: ['氧氣', '氮氣', '二氧化碳', '氬氣'], answer: 1 },
        { category: '科學', question: '植物進行光合作用主要依靠哪種色素？', options: ['葉綠素', '胡蘿蔔素', '花青素', '葉黃素'], answer: 0 },

        { category: '人工智能', question: '以下哪個是常見的機器學習方法？', options: ['深度學習', '淺度學習', '寬度學習', '高度學習'], answer: 0 },
        { category: '人工智能', question: 'ChatGPT是屬於哪種類型的人工智能？', options: ['圖像識別', '語音識別', '自然語言處理', '機器人控制'], answer: 2 },
        { category: '人工智能', question: '以下哪個不是人工智能的應用？', options: ['人臉識別', '語音助手', '自動駕駛', '手動計算器'], answer: 3 },
        { category: '人工智能', question: '神經網絡的靈感來自於什麼？', options: ['電腦晶片', '人類大腦', '動物骨骼', '植物根系'], answer: 1 },

        { category: '資訊素養', question: '以下哪個是強密碼的特徵？', options: ['只有數字', '只有小寫字母', '包含大小寫字母、數字和符號', '使用生日日期'], answer: 2 },
        { category: '資訊素養', question: '網絡釣魚攻擊主要通過什麼方式進行？', options: ['電話', '郵件或訊息', '廣播', '報紙'], answer: 1 },
        { category: '資訊素養', question: '以下哪個行為違反網絡禮儀？', options: ['尊重他人意見', '使用全大寫字母發訊息', '保護個人私隱', '確認資訊真實性'], answer: 1 },

        { category: '視覺藝術', question: '三原色是指哪三種顏色？', options: ['紅黃藍', '紅綠藍', '黑白灰', '橙紫綠'], answer: 0 }
      ],

      // 題目庫 #2
      [
        { category: '數學', question: '24的所有因數有多少個？', options: ['6', '8', '10', '12'], answer: 1 },
        { category: '數學', question: '一個正方形的周長是40cm，它的面積是多少平方厘米？', options: ['80', '100', '160', '200'], answer: 1 },

        { category: '數學', question: '若一個數的20%是40，這個數是多少？', options: ['8', '80', '200', '800'], answer: 2 },
        { category: '數學', question: '以下哪個數是完全平方數？', options: ['50', '64', '72', '80'], answer: 1 },

        { category: '科學', question: '聲音在哪種介質中傳播最快？', options: ['真空', '空氣', '水', '鋼鐵'], answer: 3 },
        { category: '科學', question: '月食是由於什麼原因造成的？', options: ['太陽擋住月球', '地球擋住太陽光', '雲層遮蔽', '月球自轉'], answer: 1 },
        { category: '科學', question: '酸雨的pH值通常是多少？', options: ['大於7', '等於7', '小於5.6', '等於10'], answer: 2 },
        { category: '科學', question: '以下哪種能源是可再生能源？', options: ['煤炭', '石油', '太陽能', '天然氣'], answer: 2 },
        { category: '科學', question: 'DNA的中文名稱是什麼？', options: ['核糖核酸', '脫氧核糖核酸', '蛋白質', '酶'], answer: 1 },
        { category: '科學', question: '牛頓第一定律也稱為什麼定律？', options: ['萬有引力定律', '慣性定律', '作用力與反作用力定律', '能量守恆定律'], answer: 1 },

        { category: '人工智能', question: '以下哪個被普遍視為人工智能早期的重要人物？', options: ['比爾·蓋茨', '史蒂夫·喬布斯', '艾倫·圖靈', '馬克·朱克伯格'], answer: 2 },
        { category: '人工智能', question: '圖靈測試主要用於測試什麼？', options: ['電腦速度', '機器智能', '網絡安全', '程式錯誤'], answer: 1 },
        { category: '人工智能', question: '以下哪個不是機器學習的常見類型？', options: ['監督學習', '非監督學習', '強化學習', '記憶學習'], answer: 3 },

        { category: '資訊素養', question: '以下哪個是開源軟件？', options: ['Microsoft Word', 'Adobe Photoshop', 'Linux', 'Windows'], answer: 2 },
        { category: '資訊素養', question: '什麼是「雲端運算」？', options: ['在雲中飛行', '通過網絡提供計算服務', '天氣預測', '航空導航'], answer: 1 },
        { category: '資訊素養', question: '以下哪個文件格式是圖像格式？', options: ['.docx', '.mp3', '.jpg', '.exe'], answer: 2 },
        { category: '資訊素養', question: '什麼是「cookies」？', options: ['餅乾', '病毒', '網站儲存在用戶電腦的小型文件', '防火牆'], answer: 2 },

        { category: '視覺藝術', question: '《蒙娜麗莎》是哪位藝術家的作品？', options: ['梵高', '畢加索', '達文西', '莫奈'], answer: 2 }
      ],

      // 題目庫 #3
      [
        { category: '數學', question: '(-5) × (-3) 等於多少？', options: ['-15', '-8', '8', '15'], answer: 3 },
        { category: '數學', question: '一個長方形的長是12cm，寬是5cm，其對角線長度是多少cm？', options: ['13', '14', '15', '17'], answer: 0 },
        { category: '數學', question: '以下哪個是無理數？', options: ['0.5', '√2', '1/3', '0.333...'], answer: 1 },

        { category: '科學', question: '元素週期表中原子序數為1的元素是什麼？', options: ['氦', '氫', '氧', '碳'], answer: 1 },

        { category: '科學', question: '以下哪種金屬在常溫下是液體？', options: ['銅', '鐵', '汞', '銀'], answer: 2 },

        { category: '人工智能', question: '用於訓練AI模型的大量資料常被稱為？', options: ['小數據', '大數據', '中數據', '微數據'], answer: 1 },
        { category: '人工智能', question: '人臉識別較常被歸類為人工智能的哪個領域？', options: ['自然語言處理', '計算機視覺', '語音識別', '專家系統'], answer: 1 },
        { category: '人工智能', question: '以下哪個可視為深度學習網絡的基本計算單元？', options: ['神經元', '細胞', '原子', '分子'], answer: 0 },
        { category: '人工智能', question: 'AI倫理較關注哪個議題？', options: ['AI的速度', 'AI的成本', 'AI的公平性和安全性', 'AI的顏色'], answer: 2 },

        { category: '資訊素養', question: '什麼是「惡意軟件」？', options: ['免費軟件', '設計用於損害電腦或竊取資料的軟件', '遊戲軟件', '教育軟件'], answer: 1 },
        { category: '資訊素養', question: '以下哪個是有效的電郵地址格式？', options: ['user@example', 'user.example.com', 'user@example.com', '@example.com'], answer: 2 },
        { category: '資訊素養', question: '「雙重認證」的主要目的是什麼？', options: ['加快登入速度', '增強帳戶安全性', '減少密碼長度', '美化界面'], answer: 1 },
        { category: '資訊素養', question: '以下哪個不是常見的網絡瀏覽器？', options: ['Chrome', 'Firefox', 'Safari', 'Excel'], answer: 3 },

        { category: '視覺藝術', question: '「印象派」繪畫的代表人物之一是誰？', options: ['達文西', '莫奈', '畢加索', '米開朗基羅'], answer: 1 }
      ],

      // 題目庫 #4
      [
        { category: '數學', question: '5! (5的階乘) 等於多少？', options: ['25', '60', '120', '720'], answer: 2 },
        { category: '數學', question: '一個圓柱體的底面半徑是3cm，高是10cm，其體積約為多少立方厘米？（π ≈ 3.14）', options: ['94', '188', '283', '942'], answer: 2 },
        { category: '數學', question: '兩條平行線被第三條直線所截，同位角的關係是什麼？', options: ['互補', '相等', '互餘', '不確定'], answer: 1 },
        { category: '數學', question: '一個班有40名學生，其中60%是女生，女生有多少人？', options: ['16', '20', '24', '28'], answer: 2 },
        { category: '數學', question: '以下哪個是勾股定理的公式？', options: ['a + b = c', 'a² + b² = c²', 'a × b = c', 'a / b = c'], answer: 1 },

        { category: '科學', question: '彩虹常被描述為有多少種顏色？', options: ['5種', '6種', '7種', '8種'], answer: 2 },
        { category: '科學', question: '地球的自轉週期約為多長時間？', options: ['12小時', '24小時', '30天', '365天'], answer: 1 },
        { category: '科學', question: '以下哪種維生素可透過曬太陽幫助人體合成？', options: ['維生素A', '維生素B', '維生素C', '維生素D'], answer: 3 },
        { category: '科學', question: '冰的密度比水的密度如何？', options: ['更大', '更小', '相同', '無法比較'], answer: 1 },
        { category: '科學', question: '以下哪個不是化石燃料？', options: ['煤', '石油', '天然氣', '木材'], answer: 3 },
        { category: '科學', question: '青蛙屬於哪類動物？', options: ['爬行類', '兩棲類', '哺乳類', '魚類'], answer: 1 },

        { category: '人工智能', question: '以下哪個公司開發了AlphaGo？', options: ['蘋果', '微軟', 'DeepMind', 'IBM'], answer: 2 },
        { category: '人工智能', question: '機器學習中的「過擬合」是什麼意思？', options: ['模型太簡單', '模型對訓練數據過度學習', '模型訓練不足', '模型運行太快'], answer: 1 },
        { category: '人工智能', question: '以下哪個是AI助手的例子？', options: ['Word', 'Siri', 'Excel', 'PowerPoint'], answer: 1 },
        { category: '人工智能', question: '「卷積神經網絡」較常用於處理什麼類型的數據？', options: ['文字', '圖像', '音樂', '數字'], answer: 1 },

        { category: '資訊素養', question: '「演算法」是什麼？', options: ['一種病毒', '解決問題的步驟/規則', '一種硬件', '一種遊戲'], answer: 1 },
        { category: '資訊素養', question: '以下哪個是程式語言或標記語言？', options: ['HTML', 'HTTP', 'URL', 'USB'], answer: 0 },
        { category: '資訊素養', question: '什麼是「開源」軟件？', options: ['免費但不能修改', '源代碼公開且可修改/再分發', '只能在商業環境使用', '只能在學校使用'], answer: 1 },
        { category: '資訊素養', question: '「IoT」代表什麼？', options: ['網絡電視', '物聯網', '線上交易', '即時通訊'], answer: 1 },

        { category: '視覺藝術', question: '中國傳統繪畫常說的「文房四寶」不包括以下哪項？', options: ['筆', '墨', '紙', '顏料'], answer: 3 }
      ]
    ];

    // 狀態
    let teamOrder = [];
    let bankForTeamIndex = [0,0,0,0]; // 0-3
    let currentTeamIndex = 0;
    let currentQuestionIndex = 0;
    let selectedAnswer = null;
    let answerConfirmed = false;
    let isGameStarted = false;
    let isSingleMode = false;
    let singleTeamIndex = -1;
    let currentMode = 'home'; // home | ready | quiz

    // 分數與作答記錄（支援補救）
    let scores = [
      { correct: 0, wrong: 0 },
      { correct: 0, wrong: 0 },
      { correct: 0, wrong: 0 },
      { correct: 0, wrong: 0 }
    ];

    // records[teamIndex][questionIndex] = { chosen: 0-3, correct: true/false }
    let records = Array.from({length:4}, () => Array.from({length:20}, () => null));

    function showScreen(name){
      document.getElementById('homeScreen').classList.remove('active');
      document.getElementById('readyScreen').classList.remove('active');
      document.getElementById('quizScreen').classList.remove('active');
      document.getElementById('homeBtnTop').style.display = (name === 'home' ? 'none' : 'inline-block');

      if(name==='home') document.getElementById('homeScreen').classList.add('active');
      if(name==='ready') document.getElementById('readyScreen').classList.add('active');
      if(name==='quiz') document.getElementById('quizScreen').classList.add('active');

      currentMode = name;
      updateHomeControls();
    }

    function updateHomeControls(){
      const resetBtn = document.getElementById('resetBtn');
      const resumeBtn = document.getElementById('resumeBtn');
      resetBtn.style.display = isGameStarted ? 'inline-block' : 'none';
      resumeBtn.style.display = isGameStarted ? 'inline-block' : 'none';

      const statusLine = document.getElementById('statusLine');
      if(!isGameStarted){
        statusLine.textContent = '主持人控制台（可向觀眾展示）';
      }else{
        if(isSingleMode){
          const t = teams[singleTeamIndex].name;
          statusLine.textContent = `比賽進行中：單社模式 - ${t}`;
        }else{
          const t = teamOrder[currentTeamIndex]?.name ?? '—';
          statusLine.textContent = `比賽進行中：目前到 ${t}（第 ${currentTeamIndex+1}/4 組）`;
        }
      }
    }

    function shuffleTeams(){
      teamOrder = [...teams].sort(() => Math.random() - 0.5);
      displayTeamOrder();
      buildBankSelectors();
      // 顯示順序和題目庫面板
      document.getElementById('teamOrder').style.display = 'flex';
      document.getElementById('bankPanel').style.display = 'block';
    }

    function displayTeamOrder(){
      const orderDiv = document.getElementById('teamOrder');
      orderDiv.innerHTML = teamOrder.map((team, index) =>
        `<div class="team-card ${team.class}">第${index+1}組<br>${team.name}</div>`
      ).join('');
    }

    function buildBankSelectors(){
      const box = document.getElementById('bankSelectors');
      box.innerHTML = teamOrder.map((team, idx) => {
        return `
          <div class="bank-item">
            <label>第${idx+1}組：${team.name}</label>
            <select id="bankSel_${idx}" onchange="updateBankSelectors()">
              <option value="0">題目庫 #1</option>
              <option value="1">題目庫 #2</option>
              <option value="2">題目庫 #3</option>
              <option value="3">題目庫 #4</option>
            </select>
          </div>
        `;
      }).join('');
      
      // 為每個組別設定預設值（0,1,2,3）
      for(let i=0; i<4; i++){
        const sel = document.getElementById(`bankSel_${i}`);
        if(sel){
          sel.value = i.toString();
          bankForTeamIndex[i] = i;
        }
      }
      
      updateBankSelectors();
    }

    function updateBankSelectors(){
      // 收集已選擇的題目庫
      const selectedBanks = [];
      for(let i=0; i<4; i++){
        const sel = document.getElementById(`bankSel_${i}`);
        if(sel){
          selectedBanks[i] = sel.value;
        }
      }
      
      // 更新每個選擇器，禁用已被其他組選擇的題目庫
      for(let i=0; i<4; i++){
        const sel = document.getElementById(`bankSel_${i}`);
        if(!sel) continue;
        
        const currentValue = sel.value;
        
        // 遍歷所有選項
        for(let optIdx=0; optIdx<sel.options.length; optIdx++){
          const option = sel.options[optIdx];
          const optValue = option.value;
          
          // 如果這個題目庫被其他組選了，就禁用
          const isSelectedByOthers = selectedBanks.some((val, idx) =>
            idx !== i && val === optValue
          );
          
          option.disabled = isSelectedByOthers;
        }
      }
    }

    function startQuiz(){
      if(teamOrder.length === 0){
        return;
      }

      // 讀取選擇
      for(let i=0;i<4;i++){
        const sel = document.getElementById(`bankSel_${i}`);
        bankForTeamIndex[i] = sel ? parseInt(sel.value, 10) : 0;
      }

      // 驗證題目庫不可重複
      const uniqueBanks = new Set(bankForTeamIndex);
      if(uniqueBanks.size !== 4){
        alert('錯誤：每個組別必須選擇不同的題目庫！');
        return;
      }

      // 如未開始過，初始化（但保留 teamOrder）
      if(!isGameStarted){
        resetAllState(true);
      }

      isGameStarted = true;
      currentTeamIndex = 0;
      currentQuestionIndex = 0;
      showReadyPage();
    }

    function startSingleDirect(){
      const teamIdx = parseInt(document.getElementById('directTeamSel').value);
      const bankIdx = parseInt(document.getElementById('directBankSel').value);

      isSingleMode = true;
      singleTeamIndex = teamIdx;
      teamOrder = [teams[teamIdx]];
      bankForTeamIndex = [0,0,0,0];
      bankForTeamIndex[singleTeamIndex] = bankIdx;

      resetAllState(true);
      isGameStarted = true;
      currentTeamIndex = 0;
      currentQuestionIndex = 0;
      showScreen('quiz');
      displayQuestion();
      updateScoreboard();
    }

    function resumeOrStart(){
      if(!isGameStarted){
        startQuiz();
        return;
      }
      if(currentMode === 'home'){
        showReadyPage();
      }
    }

    function showReadyPage(){
      if(isSingleMode){
        startTeamQuestions();
        return;
      }
      if(currentTeamIndex >= 4){
        showFinalResults();
        return;
      }
      const team = teamOrder[currentTeamIndex];
      const bankNo = bankForTeamIndex[currentTeamIndex] + 1;
      document.getElementById('readyTitle').textContent = `第${currentTeamIndex+1}組：${team.name}`;
      document.getElementById('readySub').textContent = `題目庫：#${bankNo}`;
      showScreen('ready');
    }

    function startTeamQuestions(){
      showScreen('quiz');
      displayQuestion();
      updateScoreboard();
    }

    function getCurrentBank(){
      const effIdx = isSingleMode ? singleTeamIndex : currentTeamIndex; // 多社模式：直接用當前組別索引
      const bankIndex = bankForTeamIndex[effIdx] ?? 0;
      return questionBanks[bankIndex];
    }

    function displayQuestion(){
      const team = teamOrder[currentTeamIndex];
      const effIdx = isSingleMode ? singleTeamIndex : currentTeamIndex;
      const bankNo = (bankForTeamIndex[effIdx] ?? 0) + 1;
      const bank = getCurrentBank();
      const q = bank[currentQuestionIndex];

      document.getElementById('currentTeam').textContent = `當前作答：${team.name}`;
      document.getElementById('currentTeamBar').className = `current-team ${team.class}`;
      document.getElementById('currentBankLine').textContent = `題目庫：#${bankNo}`;

      const qNumText = `第 ${currentQuestionIndex+1} / 20 題` + (isSingleMode ? '' : `（第 ${currentTeamIndex+1} 組）`);
      document.getElementById('questionNumber').textContent = qNumText;
      document.getElementById('questionCategory').textContent = q.category;
      document.getElementById('questionText').textContent = q.question;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = q.options.map((opt, idx) =>
        `<div class="option" onclick="selectOption(${idx})">${String.fromCharCode(65+idx)}. ${opt}</div>`
      ).join('');

      selectedAnswer = null;
      answerConfirmed = false;

      document.getElementById('confirmBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('clearBtn').style.display = 'none';

      const ansBox = document.getElementById('answerRevealed');
      ansBox.style.display = 'none';

      document.getElementById('prevBtn').disabled = (currentTeamIndex===0 && currentQuestionIndex===0);

      const rec = records[effIdx][currentQuestionIndex];
      if(rec){
        selectedAnswer = rec.chosen;
        answerConfirmed = true;
        renderConfirmedState(rec.chosen);
      }
    }

    function enableOptions(enable){
      document.querySelectorAll('.option').forEach(el => {
        el.style.pointerEvents = enable ? 'auto' : 'none';
      });
    }

    function selectOption(index){
      if(answerConfirmed) return;
      selectedAnswer = index;
      document.querySelectorAll('.option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if(i===index) opt.classList.add('selected');
      });
      document.getElementById('confirmBtn').style.display = 'inline-block';
    }

    function adjustScore(teamIdx, deltaCorrect, deltaWrong){
      scores[teamIdx].correct = Math.max(0, scores[teamIdx].correct + deltaCorrect);
      scores[teamIdx].wrong = Math.max(0, scores[teamIdx].wrong + deltaWrong);
    }

    function confirmAnswer(){
      if(selectedAnswer === null) return;

      const bank = getCurrentBank();
      const q = bank[currentQuestionIndex];
      const teamIdx = isSingleMode ? singleTeamIndex : currentTeamIndex;

      const oldRec = records[teamIdx][currentQuestionIndex];
      if(oldRec){
        if(oldRec.correct) adjustScore(teamIdx, -1, 0);
        else adjustScore(teamIdx, 0, -1);
      }

      const isCorrect = selectedAnswer === q.answer;
      records[teamIdx][currentQuestionIndex] = { chosen: selectedAnswer, correct: isCorrect };
      if(isCorrect) adjustScore(teamIdx, +1, 0);
      else adjustScore(teamIdx, 0, +1);

      answerConfirmed = true;
      renderConfirmedState(selectedAnswer);
      updateScoreboard();
    }

    function renderConfirmedState(chosen){
      const bank = getCurrentBank();
      const q = bank[currentQuestionIndex];
      const isCorrect = chosen === q.answer;

      document.querySelectorAll('.option').forEach((opt, i) => {
        opt.classList.remove('selected');
        if(i === q.answer) opt.classList.add('correct');
        if(i === chosen && !isCorrect) opt.classList.add('wrong');
      });
      enableOptions(false);

      const ansBox = document.getElementById('answerRevealed');
      ansBox.style.display = 'block';
      if(isCorrect){
        ansBox.textContent = '✓ 答對了！';
        ansBox.style.background = '#d4edda';
        ansBox.style.border = '2px solid #28a745';
        ansBox.style.color = '#155724';
      }else{
        ansBox.textContent = `✗ 答錯了！正確答案是：${String.fromCharCode(65+q.answer)}. ${q.options[q.answer]}`;
        ansBox.style.background = '#f8d7da';
        ansBox.style.border = '2px solid #dc3545';
        ansBox.style.color = '#721c24';
      }

      document.getElementById('confirmBtn').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'inline-block';
      document.getElementById('clearBtn').style.display = 'inline-block';
    }

    function clearThisQuestion(){
      const teamIdx = isSingleMode ? singleTeamIndex : currentTeamIndex;
      const rec = records[teamIdx][currentQuestionIndex];
      if(!rec) return;

      if(rec.correct) adjustScore(teamIdx, -1, 0);
      else adjustScore(teamIdx, 0, -1);
      records[teamIdx][currentQuestionIndex] = null;

      answerConfirmed = false;
      selectedAnswer = null;
      document.getElementById('answerRevealed').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('clearBtn').style.display = 'none';
      document.getElementById('confirmBtn').style.display = 'none';

      document.querySelectorAll('.option').forEach(opt => {
        opt.classList.remove('correct','wrong','selected');
      });
      enableOptions(true);
      updateScoreboard();
    }

    function nextQuestion(){
      currentQuestionIndex++;
      if(currentQuestionIndex >= 20){
        if(isSingleMode){
          showFinalResults();
          return;
        }
        currentTeamIndex++;
        if(currentTeamIndex >= 4){
          showFinalResults();
          return;
        }
        currentQuestionIndex = 0;
        showReadyPage();
        return;
      }
      displayQuestion();
    }

    function previousQuestion(){
      if(currentQuestionIndex > 0){
        currentQuestionIndex--;
        displayQuestion();
        return;
      }
      if(isSingleMode) return;
      if(currentTeamIndex > 0){
        currentTeamIndex--;
        currentQuestionIndex = 19;
        showScreen('quiz');
        displayQuestion();
        updateScoreboard();
      }
    }

    function updateScoreboard(){
      const board = document.getElementById('scoreboard');
      if(isSingleMode){
        const team = teams[singleTeamIndex];
        const idx = singleTeamIndex;
        board.innerHTML = `
          <div class="score-card ${team.class}">
            <div class="score-label">${team.name}</div>
            <div class="score-value">✓ ${scores[idx].correct}　✗ ${scores[idx].wrong}</div>
          </div>
        `;
      }else{
        board.innerHTML = teamOrder.map((team, idx) => `
          <div class="score-card ${team.class}">
            <div class="score-label">${team.name}</div>
            <div class="score-value">✓ ${scores[idx].correct}　✗ ${scores[idx].wrong}</div>
          </div>
        `).join('');
      }
    }

    function showFinalResults(){
      const container = document.querySelector('.container');
      let scoreboardHTML = '';
      if(isSingleMode){
        const team = teams[singleTeamIndex];
        const idx = singleTeamIndex;
        scoreboardHTML = `
          <div class="scoreboard">
            <div class="score-card ${team.class}">
              <div class="score-label">${team.name}</div>
              <div class="score-value">答對：${scores[idx].correct}</div>
              <div style="margin-top:6px;font-weight:800;">答錯：${scores[idx].wrong}</div>
            </div>
          </div>
        `;
      }else{
        scoreboardHTML = `
          <div class="scoreboard">
            ${teamOrder.map((team, idx) => `
              <div class="score-card ${team.class}">
                <div class="score-label">${team.name}</div>
                <div class="score-value">答對：${scores[idx].correct}</div>
                <div style="margin-top:6px;font-weight:800;">答錯：${scores[idx].wrong}</div>
              </div>
            `).join('')}
          </div>
        `;
      }
      const resultsHTML = `
        <div class="header" style="margin-bottom:10px;">
          <div>
            <h1>比賽結束</h1>
            <div class="sub">最終成績</div>
          </div>
          <div class="row">
            <button class="btn btn-primary" onclick="location.reload()">重新開始</button>
          </div>
        </div>
        ${scoreboardHTML}
        <div class="panel" style="margin-top:14px;">
          <div class="hint">如需再次使用不同題目庫或重新抽籤，請按「重新開始」。</div>
        </div>
      `;
      container.innerHTML = resultsHTML;
    }

    function goHome(){
      showScreen('home');
    }

    function resetAllState(keepOrder){
      scores = [
        { correct: 0, wrong: 0 },
        { correct: 0, wrong: 0 },
        { correct: 0, wrong: 0 },
        { correct: 0, wrong: 0 }
      ];
      records = Array.from({length:4}, () => Array.from({length:20}, () => null));
      selectedAnswer = null;
      answerConfirmed = false;
      currentTeamIndex = 0;
      currentQuestionIndex = 0;
      if(!keepOrder){
        teamOrder = [];
        bankForTeamIndex = [0,0,0,0];
        isSingleMode = false;
        singleTeamIndex = -1;
      }
    }

    function resetScoresOnly(){
      if(!confirm('確定要重置分數及所有已確認的作答記錄嗎？（不會重新抽籤）')) return;
      resetAllState(true);
      isGameStarted = true;
      updateHomeControls();
      alert('已重置分數與作答記錄。可在主頁修改題目庫後再按「開始比賽」或「直接作答」。');
    }

    // 初始化
    showScreen('home');
    teamOrder = []; // 初始為空，等待抽取順序
    document.getElementById('teamOrder').style.display = 'none'; // 初始隱藏
    document.getElementById('bankPanel').style.display = 'none'; // 初始隱藏
  </script>
</body>
</html>
